name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: web (lint + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm --filter @storytunes/web exec tsc --noEmit
      - name: Lint
        run: pnpm --filter @storytunes/web lint

  api:
    name: api (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install
        working-directory: apps/api
        run: uv sync
      - name: Ruff
        working-directory: apps/api
        run: uv run ruff check .
      - name: Format check
        working-directory: apps/api
        run: uv run ruff format --check .
      - name: Tests
        working-directory: apps/api
        run: uv run pytest
